services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://tutor:tutor@postgres:5432/tutor
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      SECRET_KEY: change-me-in-production
      AUTO_MIGRATIONS: "1"
      SEED_ON_STARTUP: "1"
    depends_on:
      - postgres
      - redis
      - qdrant
  worker:
    build: .
    command: ["celery", "-A", "infrastructure.celery_app:celery_app", "worker", "-l", "info"]
    environment:
      DATABASE_URL: postgresql+psycopg2://tutor:tutor@postgres:5432/tutor
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
    depends_on:
      - redis
      - postgres
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutor
      POSTGRES_DB: tutor
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
